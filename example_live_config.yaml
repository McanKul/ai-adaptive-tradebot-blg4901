# =====================================================================
# example_live_config.yaml
# =====================================================================
# Live trading configuration — Donchian ATR Vol-Target Strategy
#
# Best backtest params (7-day DOGEUSDT, realistic costs):
#   Return: 91%  |  Sharpe: 0.833  |  Max DD: 15.6%  |  Trades: 7
#
# Usage:
#     python live_runner.py --config example_live_config.yaml
# =====================================================================

# ---------- strategy ----------
strategy:
  class: "DonchianATRVolTarget"
  params:
    dc_period: 15                  # Donchian channel lookback
    atr_period: 14                 # ATR period
    atr_mult: 2.0                  # ATR multiplier for trailing stop
    risk_pct: 0.003                # Equity fraction risked per trade (0.3%)
    filter_type: "ema"             # Regime filter: "ema" | "adx" | "none"
    ema_period: 200                # EMA period for trend filter
    adx_period: 14
    adx_threshold: 25.0
    allow_reversal: true           # Allow reversing position on opposite signal

# ---------- symbols & timeframe ----------
symbols:
  - DOGEUSDT

timeframe: "15m"
name: "Donchian_ATR_Live"

# ---------- position sizing ----------
sizing:
  mode: "margin_usd"
  margin_usd: 10.0                 # $10 margin per trade (conservative start)
  leverage: 10                     # 10x leverage → $100 notional per trade
  leverage_mode: "margin"

# ---------- exit rules ----------
# Donchian strategy has its own ATR trailing stop.
# These are ADDITIONAL safety nets on the exchange side.
exit:
  take_profit_pct: 0.04            # 4% TP safety net
  stop_loss_pct: 0.02              # 2% SL safety net
  trailing_stop_pct: null          # Strategy handles trailing via ATR
  max_holding_bars: null
  use_exchange_orders: true        # Place TP/SL on Binance as safety net

# ---------- risk management ----------
risk:
  max_position_size: 100000.0
  max_position_notional: 5000.0
  max_daily_loss: 20.0             # $20 max daily loss (conservative)
  max_daily_loss_pct: 0.10
  max_drawdown: 0.20               # 20% kill switch
  max_leverage: 20.0
  max_concurrent_positions: 1      # 1 position at a time (single coin)

# ---------- support / resistance levels ----------
levels:
  enabled: false

# ---------- execution ----------
execution:
  margin_type: "ISOLATED"
  preload_bars: 250                # Need 200+ bars for EMA-200 filter
  preload_batch: 10

# ---------- news sentiment ----------
news:
  enabled: false                   # Start without news, enable later

# ---------- per-symbol overrides ----------
symbol_routes: []

# ---------- global risk ----------
global_risk:
  max_account_drawdown_pct: 0.20
  max_total_exposure_usd: 500.0    # $500 max exposure (conservative)
  max_correlated_positions: 1
  persist_path: "logs/live_risk_state.json"

# ---------- rate limiting ----------
rate_limit:
  requests_per_minute: 1000
  exchange_info_ttl_sec: 300

# ---------- API ----------
api:
  testnet: false
