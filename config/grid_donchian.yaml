# Parameter grid for DonchianATRVolTarget sweep.
#
# Live-config baseline (from live_config.yaml):
#   dc_period=15  atr_mult=1.5  ema_period=200  atr_period=14  risk_pct=0.003
#
# Grid: 3 × 3 × 2 = 18 combinations, no constraints needed.
# =====================================================================

grid:
  dc_period: [10, 15, 20]
  atr_mult: [1.0, 1.5, 2.5]
  ema_period: [100, 200]
  atr_period: [14]
  risk_pct: [0.003]
  filter_type: ["ema"]
  allow_reversal: [false]

constraints: []
