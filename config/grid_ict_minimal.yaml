# =====================================================================
# config/grid_ict_minimal.yaml
# =====================================================================
# Minimal ICT sweep grid — 3 most impactful knobs × 2 values = 8 combos.
# Hyperband 4-rung CV: 8 → 4 → 2 → 1 = ~15 evals on AVAX 1y 5m.
#
# Holds the spec-mandated bits fixed (strict bias, killzone ON, market
# entry, 1:3 RR).  Tunes the gates that show up most often in the
# diagnostic counters: discount zone width, OTE band lower edge, FVG
# size filter.
# =====================================================================

grid:
  fib_discount_max: [0.5, 0.65]
  ote_lower: [0.5, 0.62]
  fvg_min_size_atr: [0.1, 0.3]

  # Held at sensible defaults
  fib_premium_min: [0.5]
  ote_upper: [0.79]
  htf_bars_per_ltf: [12]
  htf_swing_window: [5]
  min_htf_bars: [20]
  sweep_lookback: [24]
  sweep_wick_ratio: [0.5]
  sweep_max_age_bars: [8]
  mss_swing_window: [3]
  mss_max_age_bars: [6]
  fvg_max_age_bars: [10]
  entry_mode: ["market"]
  risk_pct: [0.005]
  kill_zone_enabled: [true]
  london_start_utc: [7]
  london_end_utc: [10]
  ny_start_utc: [13]
  ny_end_utc: [16]
  atr_period: [14]
  rr_target: [3.0]
  max_holding_bars: [48]
  allow_reversal: [false]

constraints: []
